<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Super Mario — Learn English Adventure</title>

    <!-- Google Fonts: Press Start 2P -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <!-- Game Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="game-container">
        <div id="touch-controls">
            <div id="touch-dpad">
                <button id="touch-left" class="touch-btn">&lt;</button>
                <button id="touch-right" class="touch-btn">&gt;</button>
            </div>
            <div id="touch-actions">
                <button id="touch-fire" class="touch-btn touch-fire-btn">🔥</button>
                <button id="touch-jump" class="touch-btn">JUMP</button>
            </div>
        </div>
    </div>

    <!-- Phaser 3 -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>

    <!-- Utils -->
    <script src="js/utils/sprites.js"></script>
    <script src="js/utils/english.js"></script>
    <script src="js/utils/audio.js"></script>
    <script src="js/utils/touch.js"></script>
    <script src="js/utils/math.js"></script>
    <script src="js/utils/settings.js"></script>
    <script src="js/utils/levelValidator.js"></script>

    <!-- Entities -->
    <script src="js/entities/Player.js"></script>
    <script src="js/entities/Goomba.js"></script>
    <script src="js/entities/Koopa.js"></script>
    <script src="js/entities/MathSign.js"></script>
    <script src="js/entities/AnswerBlock.js"></script>
    <script src="js/entities/MathChallenge.js"></script>
    <script src="js/entities/Fireball.js"></script>

    <!-- Systems -->
    <script src="js/systems/MathSpawner.js"></script>

    <!-- Scenes -->
    <script src="js/scenes/BootScene.js"></script>
    <script src="js/scenes/MenuScene.js"></script>
    <script src="js/scenes/SettingsScene.js"></script>
    <script src="js/scenes/GameScene.js"></script>
    <script src="js/scenes/HUDScene.js"></script>
    <script src="js/scenes/WinScene.js"></script>

    <!-- Game Config (must be last — references scenes) -->
    <script src="js/config.js"></script>
</body>
</html>
